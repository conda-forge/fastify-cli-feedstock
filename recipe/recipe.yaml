context:
  version: "8.0.0"

package:
  name: fastify-cli
  version: ${{ version }}

source:
  url: https://registry.npmjs.org/fastify-cli/-/fastify-cli-${{ version }}.tgz
  sha256: 546985c52b184b8b5b9d92c6913942d172e2aa62b4fc81640f254383b16aeca2

build:
  number: 0
  noarch: generic

requirements:
  build:
    - nodejs
    - pnpm
    - pnpm-licenses
  run:
    - nodejs

tests:
  - script:
      - fastify --help

about:
  license: MIT
  license_file:
    - LICENSE
    - third-party-licenses.txt
  summary: Run a fastify route with one command!
  homepage: https://github.com/fastify/fastify-cli
  repository: https://github.com/fastify/fastify-cli

extra:
  recipe-maintainers:
    - danielnachun
